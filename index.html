<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Home Expenses Dashboard</title>

  <!-- ✅ Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- ✅ jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- ✅ DARK + LIGHT THEMES + TRANSITIONS + LAYOUT -->
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121212;
      color: #eee;
      transition: background 0.4s, color 0.4s;
    }

    /* ✅ Light Mode */
    body.light-mode {
      background: #f4f4f4;
      color: #222;
    }

    body.light-mode nav {
      background: #e9e9e9;
      border-bottom: 2px solid #1976D2;
    }

    body.light-mode h1, body.light-mode h2 {
      color: #1976D2;
    }

    body.light-mode .card {
      background: white;
      border-left-color: #1976D2;
    }

    body.light-mode canvas {
      background: #fff;
    }

    body.light-mode table {
      background: #fff;
      color: #222;
    }

    body.light-mode th {
      background: #ddd;
    }

    body.light-mode tr:nth-child(even) {
      background: #eee;
    }

    /* ✅ Navigation */
    nav {
      background: #1f1f1f;
      padding: 16px 30px;
      display: flex;
      gap: 30px;
      font-size: 18px;
      border-bottom: 2px solid #D32F2F;
      transition: background 0.4s;
    }

    nav a {
      cursor: pointer;
      color: #ccc;
      text-decoration: none;
      padding: 6px 12px;
      background: #2a2a2a;
      border-radius: 6px;
      transition: 0.3s;
    }
    nav a:hover {
      background: #D32F2F;
      color: #fff;
      transform: translateY(-2px);
    }

    .container {
      max-width: 1250px;
      margin: auto;
      padding: 40px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1, h2 {
      color: #D32F2F;
      transition: color 0.4s;
    }

    .card-box {
      display: flex;
      gap: 20px;
      margin: 30px 0;
      flex-wrap: wrap;
    }

    .card {
      background: #1e1e1e;
      padding: 20px;
      border-left: 4px solid #D32F2F;
      flex: 1;
      border-radius: 12px;
      min-width: 240px;
      transition: 0.3s;
    }
    .card:hover {
      background: #272727;
      transform: translateY(-3px);
    }

    canvas {
      margin: 35px 0;
      background: #1a1a1a;
      padding: 20px;
      border-radius: 12px;
      transition: background 0.4s;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #1e1e1e;
      border-radius: 10px;
      overflow: hidden;
      transition: background 0.4s;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #333;
    }

    th {
      background: #222;
      transition: background 0.4s;
    }

    tr:nth-child(even) {
      background: #181818;
      transition: background 0.4s;
    }

    /* ✅ Edit Modal */
    #editPanel {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: #1e1e1e;
      padding: 25px;
      border-radius: 12px;
      width: 380px;
      border: 2px solid #D32F2F;
      z-index: 9999;
    }

    body.light-mode #editPanel {
      background: #fff;
      border-color: #1976D2;
      color: #000;
    }

    #editPanel input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      background: #111;
      color: #fff;
      border: 1px solid #444;
      border-radius: 8px;
      transition: background 0.4s;
    }

    body.light-mode #editPanel input {
      background: #fafafa;
      color: #000;
      border: 1px solid #ccc;
    }

    button {
      background: #D32F2F;
      border: none;
      padding: 12px 18px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      font-size: 15px;
      transition: 0.25s ease;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(211, 47, 47, 0.4);
    }

    body.light-mode button {
      background: #1976D2;
    }
  </style>
</head>

<body>

<!-- ✅ TOP NAVIGATION -->
<nav>
  <a onclick="openEditor()">✏️ Edit Month</a>
  <a onclick="addMonth()">➕ Add Month</a>
  <a onclick="addCategory()">📌 Add Category</a>
  <a onclick="removeCategory()">❌ Remove Category</a>
  <a onclick="resetData()">🗑 Reset</a>
  <a onclick="exportPDF()">📄 Export PDF</a>
  <a onclick="toggleTheme()">🌗 Theme</a>
</nav>

<div class="container">

  <h1>Home Expenses Dashboard</h1>

  <label>Select Month:</label>
  <select id="monthSelector" onchange="switchMonth()"></select>

  <!-- ✅ Summary Cards -->
  <div class="card-box">
    <div class="card"><h3>Income</h3><p id="incomeBox"></p></div>
    <div class="card"><h3>Total Expenses</h3><p id="expenseBox"></p></div>
    <div class="card"><h3>Balance</h3><p id="balanceBox"></p></div>
    <div class="card"><h3>Highest Expense</h3><p id="highestBox"></p></div>
  </div>

  <!-- ✅ Charts -->
  <canvas id="barChart" height="110"></canvas>
  <canvas id="pieChart" height="110"></canvas>
  <canvas id="lineChart" height="110"></canvas>

  <!-- ✅ Monthly Breakdown -->
  <h2>Expense Breakdown</h2>
  <table id="expenseTable"></table>

  <!-- ✅ Yearly Summary -->
  <h2>Yearly Summary</h2>
  <table id="yearlySummary"></table>

</div>

<!-- ✅ EDIT MODAL -->
<div id="editPanel">
  <h3>Edit Month Data</h3>
  <div id="editFields"></div>
  <button onclick="saveMonth()">Save</button>
  <button onclick="closeEditor()" style="background:#444;">Cancel</button>
</div>

<script>
/*************************************************
 ✅ INITIAL DATA (FROM YOUR EXCEL)
**************************************************/
let data = JSON.parse(localStorage.getItem("expensesData")) || {
  months: {
    January: {
      income: 10529.70,
      categories: {
        "Gym": 107,
        "Health Insurance": 284.28,
        "Car Loan": 1379.41,
        "Netflix": 20.99,
        "Internet": 94.99,
        "Google": 16.99,
        "Home Insurance": 196.61,
        "Car Insurance": 138,
        "Mortgage": 6100,
        "Electricity Bill": 283.40,
        "Council Rate": 239.15,
        "Water Bill": 188,
        "Fuel": 0,
        "Grocery": 0,
        "Extra": 0
      }
    },
    February: { income: 0, categories: {} },
    March: { income: 0, categories: {} }
  }
};

let currentMonth = "January";

/*************************************************
 ✅ THEME TOGGLE
**************************************************/
function toggleTheme() {
  document.body.classList.toggle("light-mode");
  localStorage.setItem("theme", 
    document.body.classList.contains("light-mode") ? "light" : "dark"
  );
}

(function(){
  if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light-mode");
  }
})();

/*************************************************
 ✅ AUTO‑CREATE CATEGORIES FOR EMPTY MONTHS
**************************************************/
function ensureCategoriesExist(month) {
  let template = data.months["January"].categories;
  if (Object.keys(data.months[month].categories).length === 0) {
    data.months[month].categories = JSON.parse(JSON.stringify(template));
  }
}

/*************************************************
 ✅ MONTH SELECTOR
**************************************************/
function loadMonthSelector() {
  let sel = document.getElementById("monthSelector");
  sel.innerHTML = "";
  Object.keys(data.months).forEach(name => {
    let opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
  sel.value = currentMonth;
}

function switchMonth() {
  currentMonth = document.getElementById("monthSelector").value;
  ensureCategoriesExist(currentMonth);
  render();
}

/*************************************************
 ✅ ADD & REMOVE CATEGORY
**************************************************/
function addCategory() {
  let name = prompt("New category name:");
  if (!name) return;
  data.months[currentMonth].categories[name.trim()] = 0;
  save();
  render();
}

function removeCategory() {
  let cats = Object.keys(data.months[currentMonth].categories);
  let name = prompt("Enter category to remove:\n" + cats.join("\n"));
  if (!name || !cats.includes(name)) return;
  delete data.months[currentMonth].categories[name];
  save();
  render();
}

/*************************************************
 ✅ EDIT MONTH
**************************************************/
function openEditor() {
  let m = data.months[currentMonth];
  let html = `<label>Income</label><input id="edit_income" value="${m.income}">`;

  for (let c in m.categories) {
    html += `<label>${c}</label>
             <input id="c_${c}" value="${m.categories[c]}">`;
  }

  document.getElementById("editFields").innerHTML = html;
  document.getElementById("editPanel").style.display = "block";
}

function closeEditor() {
  document.getElementById("editPanel").style.display = "none";
}

function saveMonth() {
  let m = data.months[currentMonth];
  m.income = parseFloat(document.getElementById("edit_income").value);

  for (let c in m.categories) {
    m.categories[c] = parseFloat(document.getElementById("c_" + c).value);
  }

  save();
  closeEditor();
  render();
}

/*************************************************
 ✅ ADD MONTH
**************************************************/
function addMonth() {
  let name = prompt("Enter new month name:");
  if (!name) return;

  data.months[name] = { income: 0, categories: {} };
  ensureCategoriesExist(name);

  save();
  loadMonthSelector();
  currentMonth = name;
  render();
}

/*************************************************
 ✅ RESET
**************************************************/
function resetData() {
  if (confirm("Reset ALL data?")) {
    localStorage.removeItem("expensesData");
    location.reload();
  }
}

/*************************************************
 ✅ RENDER LOGIC + CHARTS
**************************************************/
let barChart, pieChart, lineChart;

function render() {
  ensureCategoriesExist(currentMonth);

  let m = data.months[currentMonth];
  let cats = m.categories;
  let labels = Object.keys(cats);
  let values = Object.values(cats);

  let total = values.reduce((a,b)=>a+b,0);
  let balance = m.income - total;
  let highest = labels[values.indexOf(Math.max(...values))];

  incomeBox.innerText = "$" + m.income.toFixed(2);
  expenseBox.innerText = "$" + total.toFixed(2);
  balanceBox.innerText = "$" + balance.toFixed(2);
  highestBox.innerText = highest;

  /******** TABLE ********/
  let t = "<tr><th>Category</th><th>Amount</th></tr>";
  labels.forEach((c,i)=> t += `<tr><td>${c}</td><td>$${values[i]}</td></tr>`);
  expenseTable.innerHTML = t;

  /******** DESTROY OLD CHARTS ********/
  if (barChart) barChart.destroy();
  if (pieChart) pieChart.destroy();
  if (lineChart) lineChart.destroy();

  /******** BAR CHART ********/
  barChart = new Chart(barChart, {
    type: "bar",
    data: {
      labels,
      datasets:[{ label:"Expenses", data:values, backgroundColor:"#D32F2F" }]
    }
  });

  /******** PIE CHART ********/
  pieChart = new Chart(pieChart, {
    type: "pie",
    data:{ labels, datasets:[{ data: values }] }
  });

  /******** LINE CHART ********/
  let months = Object.keys(data.months);
  let totals = months.map(m=>{
    let c = data.months[m].categories;
    return Object.values(c).reduce((a,b)=>a+b,0);
  });

  lineChart = new Chart(lineChart, {
    type:"line",
    data:{
      labels: months,
      datasets:[{
        label:"Total Expenses",
        data: totals,
        borderColor:"#D32F2F",
        tension:0.3
      }]
    }
  });

  renderYearlySummary();
}

/*************************************************
 ✅ YEARLY SUMMARY
**************************************************/
function renderYearlySummary() {
  let months = Object.keys(data.months);
  let html = "<tr><th>Month</th><th>Income</th><th>Expenses</th><th>Balance</th></tr>";

  let ti=0, te=0;

  months.forEach(m=>{
    let mo = data.months[m];
    let exp = Object.values(mo.categories).reduce((a,b)=>a+b,0);
    let bal = mo.income - exp;

    ti += mo.income;
    te += exp;

    html += `<tr>
              <td>${m}</td>
              <td>$${mo.income.toFixed(2)}</td>
              <td>$${exp.toFixed(2)}</td>
              <td>$${bal.toFixed(2)}</td>
            </tr>`;
  });

  html += `<tr style="background:#222;font-weight:bold;">
            <td>Total</td>
            <td>$${ti.toFixed(2)}</td>
            <td>$${te.toFixed(2)}</td>
            <td>$${(ti-te).toFixed(2)}</td>
          </tr>`;

  yearlySummary.innerHTML = html;
}

/*************************************************
 ✅ PDF EXPORT
**************************************************/
async function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(20);
  doc.text("Home Expenses Report", 10, 15);

  let y = 30;
  let m = data.months[currentMonth];
  let c = m.categories;

  doc.setFontSize(14);
  doc.text(`Month: ${currentMonth}`, 10, y); y+=10;
  doc.text(`Income: $${m.income.toFixed(2)}`, 10, y); y+=10;

  let total = Object.values(c).reduce((a,b)=>a+b,0);
  doc.text(`Total Expenses: $${total.toFixed(2)}`, 10, y); y+=10;

  doc.text("Breakdown:", 10, y); y+=10;

  Object.entries(c).forEach(([k,v])=>{
    doc.text(`${k}: $${v}`, 10, y);
    y += 8;
  });

  doc.save(`${currentMonth}_HomeExpenses.pdf`);
}

/*************************************************
 ✅ INIT
**************************************************/
loadMonthSelector();
render();

</script>

</body>
</html>
