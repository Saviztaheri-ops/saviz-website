<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Finance‑Savvy Home Expenses Dashboard</title>

  <!-- ✅ Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- ✅ jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- ✅ STYLES: FINANCE‑OPTIMIZED DARK/LIGHT THEME -->
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121212;
      color: #eee;
      transition: 0.4s ease !important;
    }
    body.light-mode {
      background: #f5f5f5;
      color: #222;
    }

    /* ✅ Navigation */
    nav {
      background: #1e1e1e;
      padding: 15px 30px;
      display: flex;
      gap: 22px;
      font-size: 17px;
      border-bottom: 3px solid #D32F2F;
    }
    body.light-mode nav {
      background: #e8e8e8;
      border-bottom-color: #1976D2;
    }
    nav a {
      padding: 6px 14px;
      background: #292929;
      border-radius: 6px;
      text-decoration: none;
      cursor: pointer;
      color: #ccc;
      transition: 0.25s;
    }
    body.light-mode nav a {
      background: #d7d7d7;
      color: #222;
    }
    nav a:hover {
      background: #D32F2F;
      transform: translateY(-2px);
      color: #fff;
    }

    .container {
      max-width: 1250px;
      margin: auto;
      padding: 40px;
      animation: fadeIn .7s ease;
    }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(15px); }
      to { opacity:1; transform:translateY(0); }
    }

    h1, h2 {
      color: #D32F2F;
      font-weight: 700;
      letter-spacing: .5px;
    }
    body.light-mode h1, body.light-mode h2 {
      color: #1976D2;
    }

    /* ✅ Cards */
    .card-box {
      display: flex;
      gap: 20px;
      margin: 30px 0;
      flex-wrap: wrap;
    }
    .card {
      background: #1d1d1d;
      padding: 20px;
      border-left: 4px solid #D32F2F;
      flex: 1;
      min-width: 240px;
      border-radius: 12px;
      transition: .25s;
    }
    .card:hover { transform: translateY(-3px); }
    body.light-mode .card {
      background: #fff;
      border-left-color: #1976D2;
    }

    /* ✅ Insights Box */
    #insightBox {
      background: #1d1d1d;
      padding: 20px;
      margin-top: 25px;
      border-radius: 12px;
      border-left: 4px solid #388E3C;
      font-size: 15px;
      line-height: 1.6;
    }
    body.light-mode #insightBox {
      background: #fff;
      border-left-color: #388E3C;
      color: #222;
    }

    /* ✅ Table */
    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
      background: #1d1d1d;
      border-radius: 10px;
      overflow: hidden;
    }
    body.light-mode table { background: #fff; }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #333;
    }
    th {
      background: #222;
    }
    body.light-mode th {
      background: #e3e3e3;
      color: #222;
    }
    tr:nth-child(even) { background: #181818; }
    body.light-mode tr:nth-child(even) { background: #f2f2f2; }

    /* ✅ Modal */
    #editPanel {
      display:none;
      position:fixed;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      background:#1d1d1d;
      padding:25px;
      border-radius:10px;
      width:380px;
      border:3px solid #D32F2F;
      z-index:9999;
    }
    #editPanel input {
      width:100%;
      padding:10px;
      margin:8px 0;
      background:#111;
      border-radius:8px;
      border:1px solid #444;
      color:#fff;
    }
    body.light-mode #editPanel { background:white; border-color:#1976D2; }
    body.light-mode #editPanel input {
      background:#f5f5f5;
      color:#222;
      border-color:#ccc;
    }

    button {
      background:#D32F2F;
      color:white;
      padding:12px 18px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      transition:.2s;
    }
    button:hover {
      transform:translateY(-2px);
      box-shadow:0 5px 10px rgba(211,47,47,.35);
    }
    body.light-mode button { background:#1976D2; }
  </style>
</head>
<body>

<!-- ✅ NAVIGATION -->
<nav>
  <a onclick="openEditor()">✏️ Edit Month</a>
  <a onclick="addMonth()">➕ Add Month</a>
  <a onclick="addCategory()">📌 Add Category</a>
  <a onclick="removeCategory()">❌ Remove Category</a>
  <a onclick="resetData()">🗑 Reset</a>
  <a onclick="exportPDF()">📄 PDF</a>
  <a onclick="toggleTheme()">🌗 Theme</a>
</nav>

<div class="container">

  <h1>Finance‑Savvy Home Expenses Dashboard</h1>

  <label>Select Month:</label>
  <select id="monthSelector" onchange="switchMonth()"></select>

  <!-- ✅ Summary Cards -->
  <div class="card-box">
    <div class="card"><h3>Income</h3><p id="incomeBox"></p></div>
    <div class="card"><h3>Total Expenses</h3><p id="expenseBox"></p></div>
    <div class="card"><h3>Balance</h3><p id="balanceBox"></p></div>
    <div class="card"><h3>Savings Rate</h3><p id="savingsRateBox"></p></div>
    <div class="card"><h3>Monthly Trend</h3><p id="trendBox"></p></div>
  </div>

  <!-- ✅ Top 3 spending -->
  <h2>Top 3 Spending Categories</h2>
  <div id="top3Box" class="card"></div>

  <!-- ✅ Insights -->
  <h2>Financial Insights</h2>
  <div id="insightBox"></div>

  <!-- ✅ Charts -->
  <canvas id="barChart" height="120"></canvas>
  <canvas id="pieChart" height="120"></canvas>
  <canvas id="lineChart" height="120"></canvas>

  <h2>Expense Breakdown</h2>
  <table id="expenseTable"></table>

  <h2>Yearly Summary</h2>
  <table id="yearlySummary"></table>

</div>

<!-- ✅ EDIT MODAL -->
<div id="editPanel">
  <h3>Edit Month</h3>
  <div id="editFields"></div>
  <button onclick="saveMonth()">Save</button>
  <button onclick="closeEditor()" style="background:#444;">Cancel</button>
</div>

<script>
/*************************************************
 ✅ INITIAL DATA + NEW FINANCE SETTINGS
**************************************************/
let data = JSON.parse(localStorage.getItem("expensesData")) || {
  months: {
    January: {
      income: 10529.70,
      categories: {
        "Gym": 107,
        "Health Insurance": 284.28,
        "Car Loan": 1379.41,
        "Netflix": 20.99,
        "Internet": 94.99,
        "Google": 16.99,
        "Home Insurance": 196.61,
        "Car Insurance": 138,
        "Mortgage": 6100,
        "Electricity Bill": 283.40,
        "Council Rate": 239.15,
        "Water Bill": 188,
        "Fuel": 120,
        "Grocery": 450,
        "Extra": 200
      }
    },
    February: { income: 5000, categories: {} },
    March: { income: 5000, categories: {} },
  }
};

let currentMonth = "January";

/*************************************************
 ✅ THEME TOGGLE (Dark/Light)
**************************************************/
function toggleTheme() {
  document.body.classList.toggle("light-mode");
  localStorage.setItem("theme", document.body.classList.contains("light-mode") ? "light" : "dark");
}
(function(){
  if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light-mode");
  }
})();

/*************************************************
 ✅ ENSURE MONTHS HAVE CATEGORIES
**************************************************/
function ensureCategoriesExist(month) {
  const template = data.months["January"].categories;
  if (Object.keys(data.months[month].categories).length === 0) {
    data.months[month].categories = JSON.parse(JSON.stringify(template));
  }
}

/*************************************************
 ✅ MONTH SELECTOR
**************************************************/
function loadMonthSelector() {
  const sel = document.getElementById("monthSelector");
  sel.innerHTML = "";
  Object.keys(data.months).forEach(m => {
    const opt = document.createElement("option");
    opt.value = m;
    opt.textContent = m;
    sel.appendChild(opt);
  });
  sel.value = currentMonth;
}

function switchMonth() {
  currentMonth = document.getElementById("monthSelector").value;
  ensureCategoriesExist(currentMonth);
  render();
}

/*************************************************
 ✅ ADD AND REMOVE CATEGORY
**************************************************/
function addCategory() {
  const name = prompt("Enter new category name:");
  if (!name) return;
  data.months[currentMonth].categories[name.trim()] = 0;
  save(); render();
}
function removeCategory() {
  let cats = Object.keys(data.months[currentMonth].categories);
  let name = prompt("Enter category to remove:\n" + cats.join("\n"));
  if (!name || !cats.includes(name)) return;
  delete data.months[currentMonth].categories[name];
  save(); render();
}

/*************************************************
 ✅ EDIT MODAL
**************************************************/
function openEditor() {
  let m = data.months[currentMonth];
  let html = `<label>Income</label><input id="edit_income" value="${m.income}">`;
  for (let c in m.categories)
    html += `<label>${c}</label><input id="c_${c}" value="${m.categories[c]}">`;
  document.getElementById("editFields").innerHTML = html;
  document.getElementById("editPanel").style.display = "block";
}
function closeEditor() { document.getElementById("editPanel").style.display = "none"; }

function saveMonth() {
  let m = data.months[currentMonth];
  m.income = parseFloat(document.getElementById("edit_income").value);
  for (let c in m.categories)
    m.categories[c] = parseFloat(document.getElementById("c_" + c).value);
  save();
  closeEditor();
  render();
}

/*************************************************
 ✅ ADD MONTH
**************************************************/
function addMonth() {
  let name = prompt("Enter new month:");
  if (!name) return;
  data.months[name] = { income: 0, categories: {} };
  ensureCategoriesExist(name);
  save();
  currentMonth = name;
  loadMonthSelector();
  render();
}

/*************************************************
 ✅ RESET
**************************************************/
function resetData() {
  if (!confirm("Reset ALL data?")) return;
  localStorage.removeItem("expensesData");
  location.reload();
}

/*************************************************
 ✅ SAVE DATA
**************************************************/
function save() {
  localStorage.setItem("expensesData", JSON.stringify(data));
}

/*************************************************
 ✅ RENDER
**************************************************/
let barChart, pieChart, lineChart;

function render() {
  ensureCategoriesExist(currentMonth);

  let m = data.months[currentMonth];
  let labels = Object.keys(m.categories);
  let values = Object.values(m.categories);

  let total = values.reduce((a,b)=>a+b,0);
  let balance = m.income - total;
  let savingsRate = (balance / m.income) * 100;

  /*********** CARDS ***********/
  incomeBox.innerText = "$" + m.income.toFixed(2);
  expenseBox.innerText = "$" + total.toFixed(2);
  balanceBox.innerText = "$" + balance.toFixed(2);
  savingsRateBox.innerText = savingsRate.toFixed(1) + "%";

  /*********** TREND ***********/
  let monthList = Object.keys(data.months);
  let idx = monthList.indexOf(currentMonth);
  let prev = idx > 0 ? monthList[idx - 1] : null;
  let trendText = "N/A";
  if (prev) {
    let prevExp = Object.values(data.months[prev].categories).reduce((a,b)=>a+b,0);
    let diff = ((total - prevExp) / prevExp) * 100;
    trendText = diff > 0 ? `⬆️ +${diff.toFixed(1)}%` : `⬇️ ${diff.toFixed(1)}%`;
  }
  trendBox.innerText = trendText;

  /*********** TOP 3 ***********/
  let sorted = Object.entries(m.categories).sort((a,b)=>b[1]-a[1]).slice(0,3);
  top3Box.innerHTML = sorted.map(x => `${x[0]} — $${x[1]}`).join("<br>");

  /*********** INSIGHTS ***********/
  let insights = [];
  if (savingsRate > 20) insights.push("✅ Strong savings rate this month!");
  if (total > m.income) insights.push("⚠️ You're spending more than you earn.");
  if (sorted[0][1] > total * 0.5) insights.push(`🏠 ${sorted[0][0]} dominates your spending.`);
  if (!insights.length) insights.push("📊 Healthy financial performance.");
  insightBox.innerHTML = insights.map(i=>"<p>"+i+"</p>").join("");

  /*********** TABLE ***********/
  let table = "<tr><th>Category</th><th>Amount</th></tr>";
  labels.forEach((c,i)=> table += `<tr><td>${c}</td><td>$${values[i]}</td></tr>`);
  expenseTable.innerHTML = table;

  /*********** CHARTS ***********/
  if (barChart) barChart.destroy();
  if (pieChart) pieChart.destroy();
  if (lineChart) lineChart.destroy();

  barChart = new Chart(document.getElementById("barChart"), {
    type:"bar",
    data:{ labels, datasets:[{label:"Expenses", data:values, backgroundColor:"#D32F2F"}] }
  });

  pieChart = new Chart(document.getElementById("pieChart"), {
    type:"pie", data:{ labels, datasets:[{ data:values }] }
  });

  let months = Object.keys(data.months);
  let totals = months.map(m=>Object.values(data.months[m].categories).reduce((a,b)=>a+b,0));

  lineChart = new Chart(document.getElementById("lineChart"), {
    type:"line",
    data:{
      labels:months,
      datasets:[{ label:"Total Expenses", data:totals, borderColor:"#D32F2F", tension:0.25 }]
    }
  });

  /*********** YEARLY SUMMARY ***********/
  let html = "<tr><th>Month</th><th>Income</th><th>Expenses</th><th>Balance</th></tr>";
  let ti=0, te=0;
  months.forEach(m=>{
    let income = data.months[m].income;
    let exp = Object.values(data.months[m].categories).reduce((a,b)=>a+b,0);
    let bal = income - exp;
    ti += income; te += exp;
    html += `<tr><td>${m}</td><td>$${income.toFixed(2)}</td><td>$${exp.toFixed(2)}</td><td>$${bal.toFixed(2)}</td></tr>`;
  });
  yearlySummary.innerHTML = html;
}

/*************************************************
 ✅ EXPORT PDF
**************************************************/
async function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(20);
  doc.text("Home Expenses Report", 10, 15);

  let y = 30;
  let m = data.months[currentMonth];
  let c = m.categories;

  doc.setFontSize(14);
  doc.text(`Month: ${currentMonth}`, 10, y); y+=10;
  doc.text(`Income: $${m.income.toFixed(2)}`, 10, y); y+=10;

  let total = Object.values(c).reduce((a,b)=>a+b,0);
  doc.text(`Total Expenses: $${total.toFixed(2)}`, 10, y); y+=10;

  doc.text("Breakdown:", 10, y); y+=10;
  Object.entries(c).forEach(([k,v])=>{
    doc.text(`${k}: $${v}`, 10, y);
    y+=8;
  });

  doc.save(`${currentMonth}_HomeExpenses.pdf`);
}

/*************************************************
 ✅ INIT
**************************************************/
loadMonthSelector();
render();
</script>

</body>
</html>
