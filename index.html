<!DOCTYPE html>
<html>
<head>
  <title>Home Expenses Dashboard</title>
  <meta charset="UTF-8">

  <!-- ✅ Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- ✅ DARK THEME + CLEAN LAYOUT -->
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121212;
      color: #eee;
    }

    /* ✅ Top Navigation */
    nav {
      background: #1f1f1f;
      padding: 15px 25px;
      display: flex;
      gap: 25px;
      font-size: 18px;
      border-bottom: 2px solid #D32F2F;
    }
    nav a {
      color: #ccc;
      text-decoration: none;
    }
    nav a:hover {
      color: #fff;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 25px;
    }

    h1, h2 {
      color: #D32F2F;
    }

    .card-box {
      display: flex;
      gap: 20px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .card {
      background: #1e1e1e;
      padding: 20px;
      border-left: 4px solid #D32F2F;
      flex: 1;
      border-radius: 8px;
      min-width: 200px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #1e1e1e;
      border-radius: 8px;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #333;
    }
    th {
      background: #222;
    }

    /* ✅ Edit Modal */
    #editPanel {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: #1e1e1e;
      padding: 25px;
      border-radius: 10px;
      width: 350px;
      border: 2px solid #D32F2F;
      z-index: 9999;
    }
    #editPanel input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      background: #111;
      color: #fff;
      border: 1px solid #444;
      border-radius: 6px;
    }
    button {
      background: #D32F2F;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

<!-- ✅ TOP NAVIGATION -->
<nav>
  <a href="#">Dashboard</a>
  <a href="#" onclick="openEditor()">Edit Month</a>
  <a href="#" onclick="addMonth()">Add Month</a>
  <a href="#" onclick="resetData()">Reset Data</a>
</nav>

<div class="container">

  <h1>Home Expenses Dashboard</h1>

  <!-- ✅ Month dropdown -->
  <label>Select Month:</label>
  <select id="monthSelector" onchange="switchMonth()"></select>

  <!-- ✅ Summary Cards -->
  <div class="card-box">
    <div class="card"><h3>Income</h3><p id="incomeBox"></p></div>
    <div class="card"><h3>Total Expenses</h3><p id="expenseBox"></p></div>
    <div class="card"><h3>Balance</h3><p id="balanceBox"></p></div>
    <div class="card"><h3>Highest Expense</h3><p id="highestBox"></p></div>
  </div>

  <!-- ✅ Charts -->
  <canvas id="barChart" height="120"></canvas>
  <canvas id="pieChart" height="120"></canvas>
  <canvas id="lineChart" height="120"></canvas>

  <!-- ✅ Table -->
  <h2>Expense Breakdown</h2>
  <table id="expenseTable"></table>

</div>

<!-- ✅ EDIT MODAL -->
<div id="editPanel">
  <h3>Edit Month Data</h3>
  <div id="editFields"></div>
  <button onclick="saveMonth()">Save</button>
  <button onclick="closeEditor()" style="background:#444;">Cancel</button>
</div>

<script>
/* ✅ PRELOADED DATA FROM YOUR EXCEL FILE */
let data = JSON.parse(localStorage.getItem("expensesData")) || {
  months: {
    January: {
      income: 10529.70,
      categories: {
        "Gym": 107,
        "Health Insurance": 284.28,
        "Car Loan": 1379.41,
        "Netflix": 20.99,
        "Internet": 94.99,
        "Google": 16.99,
        "Home Insurance": 196.61,
        "Car Insurance": 138,
        "Mortgage": 6100,
        "Electricity Bill": 283.40,
        "Council Rate": 239.15,
        "Water Bill": 188
      }
    },
    February: { income: 0, categories: {} },
    March: { income: 0, categories: {} }
  }
};

let currentMonth = "January";

/* ✅ Month dropdown setup */
function loadMonthSelector() {
  let sel = document.getElementById("monthSelector");
  sel.innerHTML = "";
  Object.keys(data.months).forEach(m => {
    let opt = document.createElement("option");
    opt.value = m; opt.textContent = m;
    if (m === currentMonth) opt.selected = true;
    sel.appendChild(opt);
  });
}

/* ✅ Switch selected month */
function switchMonth() {
  currentMonth = document.getElementById("monthSelector").value;
  render();
}

/* ✅ Add a new month */
function addMonth() {
  const name = prompt("Enter new month name:");
  if (!name) return;
  data.months[name] = { income: 0, categories: {} };
  currentMonth = name;
  save(); loadMonthSelector(); render();
}

/* ✅ Editor popup */
function openEditor() {
  let m = data.months[currentMonth];
  let html = `<label>Income</label><input id='edit_income' value='${m.income}'>`;
  for (let c in m.categories) {
    html += `<label>${c}</label><input id='c_${c}' value='${m.categories[c]}'>`;
  }
  document.getElementById("editFields").innerHTML = html;
  document.getElementById("editPanel").style.display = "block";
}
function closeEditor() {
  document.getElementById("editPanel").style.display = "none";
}

/* ✅ Save edited month */
function saveMonth() {
  let m = data.months[currentMonth];
  m.income = parseFloat(document.getElementById("edit_income").value);

  for (let c in m.categories) {
    m.categories[c] = parseFloat(document.getElementById("c_" + c).value);
  }

  save();
  closeEditor();
  render();
}

/* ✅ Save to localStorage */
function save() {
  localStorage.setItem("expensesData", JSON.stringify(data));
}

/* ✅ Reset data */
function resetData() {
  if (confirm("Reset all data?")) {
    localStorage.removeItem("expensesData");
    location.reload();
  }
}

/* ✅ Render dashboard */
let barChart, pieChart, lineChart;

function render() {
  let m = data.months[currentMonth];
  let cats = m.categories;
  let labels = Object.keys(cats);
  let values = Object.values(cats);

  // ✅ Summary boxes
  let total = values.reduce((a,b)=>a+b,0);
  let balance = m.income - total;
  let highest = labels.length ? labels[values.indexOf(Math.max(...values))] : "-";

  document.getElementById("incomeBox").innerText = "$" + m.income.toFixed(2);
  document.getElementById("expenseBox").innerText = "$" + total.toFixed(2);
  document.getElementById("balanceBox").innerText = "$" + balance.toFixed(2);
  document.getElementById("highestBox").innerText = highest;

  // ✅ Table
  let table = "<tr><th>Category</th><th>Amount</th></tr>";
  labels.forEach((c,i)=>{
    table += `<tr><td>${c}</td><td>$${values[i]}</td></tr>`;
  });
  document.getElementById("expenseTable").innerHTML = table;

  // ✅ Destroy old charts
  if (barChart) barChart.destroy();
  if (pieChart) pieChart.destroy();
  if (lineChart) lineChart.destroy();

  // ✅ Bar Chart
  barChart = new Chart(document.getElementById("barChart"), {
    type:"bar",
    data:{ labels, datasets:[{ label:"Expenses", data:values, backgroundColor:"#D32F2F" }] },
    options:{ responsive:true }
  });

  // ✅ Pie Chart
  pieChart = new Chart(document.getElementById("pieChart"), {
    type:"pie",
    data:{ labels, datasets:[{ data:values }] },
    options:{ responsive:true }
  });

  // ✅ Line Chart (multi-month trend)
  let months = Object.keys(data.months);
  let monthlyTotals = months.map(m=> {
    let mc = data.months[m].categories;
    return Object.values(mc).reduce((a,b)=>a+b,0);
  });

  lineChart = new Chart(document.getElementById("lineChart"), {
    type:"line",
    data:{
      labels: months,
      datasets:[{
        label:"Total Expenses",
        data: monthlyTotals,
        borderColor:"#D32F2F",
        tension: 0.3
      }]
    }
  });
}

/* ✅ Initialize */
loadMonthSelector();
render();

</script>

</body>
</html>
``
