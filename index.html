<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Home Expenses Dashboard</title>

  <!-- ✅ Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- ✅ jsPDF (PDF Export) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- ✅ DARK THEME + MODERN UI -->
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121212;
      color: #eee;
    }

    /* ✅ Top Navigation */
    nav {
      background: #1f1f1f;
      padding: 15px 30px;
      display: flex;
      gap: 30px;
      font-size: 18px;
      border-bottom: 2px solid #D32F2F;
    }
    nav a {
      color: #ccc;
      text-decoration: none;
      cursor: pointer;
    }
    nav a:hover { color: #fff; }

    .container {
      max-width: 1250px;
      margin: auto;
      padding: 40px;
    }

    h1, h2 {
      color: #D32F2F;
      margin-bottom: 15px;
    }

    .card-box {
      display: flex;
      gap: 20px;
      margin: 30px 0;
      flex-wrap: wrap;
    }

    .card {
      background: #1e1e1e;
      padding: 20px;
      border-left: 4px solid #D32F2F;
      flex: 1;
      border-radius: 12px;
      min-width: 240px;
      transition: 0.25s ease;
    }
    .card:hover {
      background: #272727;
      transform: translateY(-3px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #1e1e1e;
      border-radius: 10px;
      overflow: hidden;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #333;
    }
    th { background: #222; }
    tr:nth-child(even) { background: #181818; }

    canvas {
      margin: 35px 0;
      background: #1a1a1a;
      padding: 20px;
      border-radius: 12px;
    }

    /* ✅ Edit Modal */
    #editPanel {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: #1e1e1e;
      padding: 25px;
      border-radius: 12px;
      width: 380px;
      border: 2px solid #D32F2F;
      z-index: 9999;
    }
    #editPanel input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      background: #111;
      color: #fff;
      border: 1px solid #444;
      border-radius: 8px;
    }

    button {
      background: #D32F2F;
      border: none;
      padding: 12px 18px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      font-size: 15px;
      transition: 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(211, 47, 47, 0.4);
    }
  </style>
</head>

<body>

<!-- ✅ TOP NAVIGATION -->
<nav>
  <a onclick="openEditor()">✏️ Edit Month</a>
  <a onclick="addMonth()">➕ Add Month</a>
  <a onclick="resetData()">🗑 Reset</a>
  <a onclick="exportPDF()">📄 Export PDF</a>
</nav>

<div class="container">

  <h1>Home Expenses Dashboard</h1>

  <label>Select Month:</label>
  <select id="monthSelector" onchange="switchMonth()"></select>

  <!-- ✅ Summary cards -->
  <div class="card-box">
    <div class="card"><h3>Income</h3><p id="incomeBox"></p></div>
    <div class="card"><h3>Total Expenses</h3><p id="expenseBox"></p></div>
    <div class="card"><h3>Balance</h3><p id="balanceBox"></p></div>
    <div class="card"><h3>Highest Expense</h3><p id="highestBox"></p></div>
  </div>

  <!-- ✅ Charts -->
  <canvas id="barChart" height="110"></canvas>
  <canvas id="pieChart" height="110"></canvas>
  <canvas id="lineChart" height="110"></canvas>

  <!-- ✅ Expense Breakdown -->
  <h2>Expense Breakdown</h2>
  <table id="expenseTable"></table>

  <!-- ✅ Yearly Summary -->
  <h2>Yearly Summary</h2>
  <table id="yearlySummary"></table>

</div>

<!-- ✅ EDIT MODAL -->
<div id="editPanel">
  <h3>Edit Month Data</h3>
  <div id="editFields"></div>
  <button onclick="saveMonth()">Save</button>
  <button onclick="closeEditor()" style="background:#444;">Cancel</button>
</div>


<script>
/*************************************************
 ✅ PRELOADED DATA + NEW CATEGORIES
**************************************************/
let data = JSON.parse(localStorage.getItem("expensesData")) || {
  months: {
    January: {
      income: 10529.70,
      categories: {
        "Gym": 107,
        "Health Insurance": 284.28,
        "Car Loan": 1379.41,
        "Netflix": 20.99,
        "Internet": 94.99,
        "Google": 16.99,
        "Home Insurance": 196.61,
        "Car Insurance": 138,
        "Mortgage": 6100,
        "Electricity Bill": 283.40,
        "Council Rate": 239.15,
        "Water Bill": 188,
        "Fuel": 0,
        "Grocery": 0,
        "Extra": 0
      }
    },
    February: { income: 0, categories: {} },
    March: { income: 0, categories: {} }
  }
};

let currentMonth = "January";

/*************************************************
 ✅ Auto‑create categories for empty months
**************************************************/
function ensureCategoriesExist(month) {
  let template = data.months["January"].categories;
  if (Object.keys(data.months[month].categories).length === 0) {
    data.months[month].categories = JSON.parse(JSON.stringify(template));
  }
}

/*************************************************
 ✅ Month Dropdown
**************************************************/
function loadMonthSelector() {
  let sel = document.getElementById("monthSelector");
  sel.innerHTML = "";
  Object.keys(data.months).forEach(m => {
    let opt = document.createElement("option");
    opt.value = m;
    opt.textContent = m;
    sel.appendChild(opt);
  });
  sel.value = currentMonth;
}

function switchMonth() {
  currentMonth = document.getElementById("monthSelector").value;
  ensureCategoriesExist(currentMonth);
  render();
}

/*************************************************
 ✅ Add Month
**************************************************/
function addMonth() {
  let name = prompt("Enter new month name:");
  if (!name) return;
  data.months[name] = { income: 0, categories: {} };
  ensureCategoriesExist(name);
  save();
  loadMonthSelector();
  currentMonth = name;
  render();
}

/*************************************************
 ✅ Edit Panel
**************************************************/
function openEditor() {
  let m = data.months[currentMonth];
  let html = `<label>Income</label><input id='edit_income' value='${m.income}'>`;
  for (let c in m.categories) {
    html += `<label>${c}</label><input id='c_${c}' value='${m.categories[c]}'>`;
  }
  document.getElementById("editFields").innerHTML = html;
  document.getElementById("editPanel").style.display = "block";
}
function closeEditor() { document.getElementById("editPanel").style.display = "none"; }

function saveMonth() {
  let m = data.months[currentMonth];
  m.income = parseFloat(document.getElementById("edit_income").value);
  for (let c in m.categories) {
    m.categories[c] = parseFloat(document.getElementById("c_" + c).value);
  }
  save();
  closeEditor();
  render();
}

/*************************************************
 ✅ Save to LocalStorage
**************************************************/
function save() {
  localStorage.setItem("expensesData", JSON.stringify(data));
}

/*************************************************
 ✅ Reset
**************************************************/
function resetData() {
  if (confirm("Reset ALL data?")) {
    localStorage.removeItem("expensesData");
    location.reload();
  }
}

/*************************************************
 ✅ Rendering Logic
**************************************************/
let barChart, pieChart, lineChart;

function render() {
  ensureCategoriesExist(currentMonth);

  let m = data.months[currentMonth];
  let labels = Object.keys(m.categories);
  let values = Object.values(m.categories);

  let total = values.reduce((a,b)=>a+b,0);
  let balance = m.income - total;
  let highest = labels[values.indexOf(Math.max(...values))];

  incomeBox.innerText = "$" + m.income.toFixed(2);
  expenseBox.innerText = "$" + total.toFixed(2);
  balanceBox.innerText = "$" + balance.toFixed(2);
  highestBox.innerText = highest;

  /******** TABLE ********/
  let html = "<tr><th>Category</th><th>Amount</th></tr>";
  labels.forEach((c,i) => {
    html += `<tr><td>${c}</td><td>$${values[i]}</td></tr>`;
  });
  expenseTable.innerHTML = html;

  /******** CHARTS ********/
  if (barChart) barChart.destroy();
  if (pieChart) pieChart.destroy();
  if (lineChart) lineChart.destroy();

  barChart = new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Expenses",
        data: values,
        backgroundColor: "#D32F2F"
      }]
    }
  });

  pieChart = new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: { labels, datasets: [{ data: values }] }
  });

  let months = Object.keys(data.months);
  let totals = months.map(m => {
    let c = data.months[m].categories;
    return Object.values(c).reduce((a,b)=>a+b,0);
  });

  lineChart = new Chart(document.getElementById("lineChart"), {
    type: "line",
    data: {
      labels: months,
      datasets: [{ label: "Total Expenses", data: totals, borderColor: "#D32F2F" }]
    }
  });

  renderYearlySummary();
}

/*************************************************
 ✅ Yearly Summary
**************************************************/
function renderYearlySummary() {
  let months = Object.keys(data.months);
  let ti=0, te=0;
  let html = "<tr><th>Month</th><th>Income</th><th>Expenses</th><th>Balance</th></tr>";

  months.forEach(m => {
    let mm = data.months[m];
    let exp = Object.values(mm.categories).reduce((a,b)=>a+b,0);
    let bal = mm.income - exp;

    ti += mm.income;
    te += exp;

    html += `<tr>
              <td>${m}</td>
              <td>$${mm.income.toFixed(2)}</td>
              <td>$${exp.toFixed(2)}</td>
              <td>$${bal.toFixed(2)}</td>
             </tr>`;
  });

  html += `<tr style='background:#222;font-weight:bold;'>
            <td>Total</td>
            <td>$${ti.toFixed(2)}</td>
            <td>$${te.toFixed(2)}</td>
            <td>$${(ti-te).toFixed(2)}</td>
          </tr>`;

  yearlySummary.innerHTML = html;
}

/*************************************************
 ✅ PDF EXPORT
**************************************************/
async function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(20);
  doc.text("Home Expenses Report", 10, 15);

  let y = 30;
  let m = data.months[currentMonth];
  let c = m.categories;

  doc.setFontSize(14);
  doc.text(`Month: ${currentMonth}`, 10, y); y+=10;
  doc.text(`Income: $${m.income.toFixed(2)}`, 10, y); y+=10;

  let total = Object.values(c).reduce((a,b)=>a+b,0);
  doc.text(`Total Expenses: $${total.toFixed(2)}`, 10, y); y+=10;

  doc.text("Expense Breakdown:", 10, y); y+=10;

  Object.entries(c).forEach(([k,v])=>{
    doc.text(`${k}: $${v}`, 10, y);
    y+=8;
  });

  doc.save(`${currentMonth}_HomeExpenses.pdf`);
}

/*************************************************
 ✅ INIT
**************************************************/
loadMonthSelector();
render();
</script>

</body>
</html>
